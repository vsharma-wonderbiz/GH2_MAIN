services:
  # PostgreSQL database
  postgres:
    image: postgres:16
    container_name: gh2_database
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5433:5432"

  # RabbitMQ broker
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq_container
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # Modbus simulator service
  modsim:
    build: ./modsim
    container_name: modsim-server
    ports:
      - "5020:5020"
      - "9000:9000"
    env_file:
      - ./modsim/.env

  # Backend service
  backend:
    build: ./Backend/GH2-Main
    container_name: GH2-Backend
    ports:
      - "7144:7144"
    env_file:
      - ./Backend/GH2-Main/GH2-Main/.env
    depends_on:
      - postgres
      - rabbitmq
      - modsim

  # OPC UA server
  opcua:
    build: ./opcua/server
    container_name: opcua-server
    ports:
      - "4840:4840"
    env_file:
      - ./opcua/server/.env
    depends_on:
      - backend

volumes:
  rabbitmq_data: